<div class="layout">
  <nav class="navbar">
    <div class="navbar-brand">
      <span class="brand-icon">⊕</span>
      <span class="brand-name">QUANTI<span class="brand-accent">MEASURE</span></span>
    </div>

    <button class="menu-toggle" (click)="toggleMenu()" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>

    <div class="navbar-links" [class.open]="menuOpen()">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-link" (click)="closeMenu()">
        <span class="nav-icon">◈</span> Dashboard
      </a>
      <a routerLink="/calculator" routerLinkActive="active" class="nav-link" (click)="closeMenu()">
        <span class="nav-icon">⊞</span> Calculator
      </a>
      <a routerLink="/history" routerLinkActive="active" class="nav-link" (click)="closeMenu()">
        <span class="nav-icon">◎</span> History
      </a>
    </div>

    <div class="navbar-user">
      <span class="user-badge">{{ auth.user()?.charAt(0)?.toUpperCase() }}</span>
      <span class="username">{{ auth.user() }}</span>
      <button class="logout-btn" (click)="logout()" title="Logout">⏻</button>
    </div>
  </nav>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
